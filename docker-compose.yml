services:
  mongo:
    image: mongo:7
    container_name: smart-agriwaste-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: smart-agriwaste-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV:-development}
      PORT: 5000
      MONGO_URI: ${BACKEND_MONGO_URI:-mongodb://mongo:27017/smart-agriwaste}
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,https://smart-agriwaste.vercel.app,https://smart-agriwaste-full.onrender.com}
      IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY:-}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY:-}
      IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      ONESIGNAL_APP_ID: ${NEXT_PUBLIC_ONESIGNAL_APP_ID:-}
      ONESIGNAL_REST_API_KEY: ${ONESIGNAL_REST_API_KEY:-}
      AZURE_TRANSLATOR_ENDPOINT: ${AZURE_TRANSLATOR_ENDPOINT:-}
      AZURE_TRANSLATOR_KEY: ${AZURE_TRANSLATOR_KEY:-}
      AZURE_TRANSLATOR_REGION: ${AZURE_TRANSLATOR_REGION:-}
    ports:
      - "5000:5000"

  dataset-api:
    build:
      context: ./dataset-api
    container_name: smart-agriwaste-dataset-api
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 8080
      MONGO_URI: ${DATASET_API_MONGO_URI:-mongodb://mongo:27017/smart-agriwaste}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APP_ENV: ${FRONTEND_APP_ENV:-development}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000/api}
        NEXT_PUBLIC_AGRI_API_URL: ${NEXT_PUBLIC_AGRI_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:5000}
        NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY: ${NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY:-}
        NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: ${NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT:-}
        NEXT_PUBLIC_IMAGEKIT_AUTH_ENDPOINT: ${NEXT_PUBLIC_IMAGEKIT_AUTH_ENDPOINT:-http://localhost:5000/api/imagekit/auth}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_ONESIGNAL_APP_ID: ${NEXT_PUBLIC_ONESIGNAL_APP_ID:-}
    container_name: smart-agriwaste-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - dataset-api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: ${FRONTEND_APP_ENV:-development}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    ports:
      - "3000:3000"

volumes:
  mongo-data:
